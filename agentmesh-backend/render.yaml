services:
  - type: web
    name: agentmesh-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8

      - key: ENVIRONMENT
        value: production

      - key: GEMINI_API_KEY
        sync: false

      - key: FRONTEND_ORIGINS
        sync: false